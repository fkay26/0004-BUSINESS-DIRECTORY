<!DOCTYPE html>
<html>
<head>
    <title>Add Business</title>

    <style>
        body {
            font-family: Arial;
            background-color: #e8f5e9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .box {
            width: 300px;
            background: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }

        input {
            width: 90%;
            padding: 10px;
            margin-top: 10px;
        }

        button {
            background: green;
            color: white;
            padding: 10px;
            border: none;
            margin-top: 10px;
            width: 100%;
        }

        a {
            display: block;
            margin-top: 10px;
            color: green;
        }
    </style>

</head>

<body>

<div class="box">

    <h2>Add Business</h2>

    <form method="POST">
        <input type="text" name="name" placeholder="Business Name" required>
        <input type="text" name="category" placeholder="Category" required>
        <button type="submit">Add</button>
    </form>

    <a href="/">Back to Home</a>

</div>

</body>
</html>
